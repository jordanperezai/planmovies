<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PlanMovies — logo directions, round 2</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-deep:#07080a; --bg-card:#12151b; --gold:#c9a84c; --text-primary:#e8e6e1; --text-secondary:#8a8880;
    --display:'Barlow Condensed',sans-serif;
  }
  *{box-sizing:border-box;}
  body{background:var(--bg-deep);color:var(--text-primary);font-family:var(--display);margin:0;padding:32px 20px;}
  h1{font-weight:800;letter-spacing:2px;text-transform:uppercase;font-size:18px;color:var(--gold);margin:0 0 4px;}
  .sub{color:var(--text-secondary);font-size:13px;letter-spacing:1px;margin-bottom:28px;}
  .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;max-width:760px;}
  .card{background:var(--bg-card);border-radius:12px;padding:28px 20px;display:flex;flex-direction:column;align-items:center;gap:16px;}
  .name{font-weight:700;letter-spacing:5px;text-transform:uppercase;font-size:22px;color:var(--text-primary);}
  .name b{color:var(--gold);font-weight:700;}
  .label{color:var(--gold);font-size:11px;letter-spacing:2px;text-transform:uppercase;}
  .small{display:flex;align-items:center;gap:18px;margin-top:4px;padding-top:14px;border-top:1px solid rgba(255,255,255,.06);width:100%;justify-content:center;}
  .small .cap{font-size:10px;color:var(--text-secondary);letter-spacing:1px;}
  .navsim{display:flex;align-items:center;gap:8px;}
  .navsim span{font-size:12px;letter-spacing:2px;color:var(--text-secondary);text-transform:uppercase;}
</style>
</head>
<body>
<h1>PlanMovies — four more directions</h1>
<div class="sub">Round 2. Same small-size proof on the bottom strip.</div>

<div class="grid">

  <!-- 5. MARQUEE -->
  <div class="card">
    <span class="label">5 · Marquee</span>
    <svg width="84" viewBox="0 0 100 100" aria-hidden="true">
      <rect x="46" y="17" width="8" height="14" rx="2" fill="var(--gold)"/>
      <rect x="18" y="30" width="64" height="40" rx="8" fill="var(--gold)"/>
      <polygon points="44,40 44,54 59,47" fill="#07080a"/>
      <circle cx="28" cy="64" r="2.6" fill="#07080a"/><circle cx="39" cy="64" r="2.6" fill="#07080a"/><circle cx="50" cy="64" r="2.6" fill="#07080a"/><circle cx="61" cy="64" r="2.6" fill="#07080a"/><circle cx="72" cy="64" r="2.6" fill="#07080a"/>
    </svg>
    <div class="name">Plan<b>Movies</b></div>
    <div class="small">
      <div style="display:flex;flex-direction:column;align-items:center;gap:4px;">
        <svg width="24" viewBox="0 0 100 100" aria-hidden="true">
          <rect x="46" y="17" width="8" height="14" rx="2" fill="var(--gold)"/>
          <rect x="18" y="30" width="64" height="40" rx="8" fill="var(--gold)"/>
          <polygon points="44,40 44,54 59,47" fill="#07080a"/>
          <circle cx="28" cy="64" r="2.6" fill="#07080a"/><circle cx="39" cy="64" r="2.6" fill="#07080a"/><circle cx="50" cy="64" r="2.6" fill="#07080a"/><circle cx="61" cy="64" r="2.6" fill="#07080a"/><circle cx="72" cy="64" r="2.6" fill="#07080a"/>
        </svg>
        <span class="cap">24px</span>
      </div>
      <div class="navsim">
        <svg width="20" viewBox="0 0 100 100" aria-hidden="true">
          <rect x="18" y="30" width="64" height="40" rx="8" fill="var(--gold)"/>
          <polygon points="44,40 44,54 59,47" fill="#07080a"/>
        </svg>
        <span>PlanMovies</span>
      </div>
    </div>
  </div>

  <!-- 6. CHAT BUBBLE + PLAY -->
  <div class="card">
    <span class="label">6 · The plan (chat + play)</span>
    <svg width="84" viewBox="0 0 100 100" aria-hidden="true">
      <rect x="16" y="22" width="68" height="46" rx="14" fill="var(--gold)"/>
      <polygon points="30,63 30,82 49,65" fill="var(--gold)"/>
      <polygon points="43,37 43,53 59,45" fill="#07080a"/>
    </svg>
    <div class="name">Plan<b>Movies</b></div>
    <div class="small">
      <div style="display:flex;flex-direction:column;align-items:center;gap:4px;">
        <svg width="24" viewBox="0 0 100 100" aria-hidden="true">
          <rect x="16" y="22" width="68" height="46" rx="14" fill="var(--gold)"/>
          <polygon points="30,63 30,82 49,65" fill="var(--gold)"/>
          <polygon points="43,37 43,53 59,45" fill="#07080a"/>
        </svg>
        <span class="cap">24px</span>
      </div>
      <div class="navsim">
        <svg width="20" viewBox="0 0 100 100" aria-hidden="true">
          <rect x="16" y="22" width="68" height="46" rx="14" fill="var(--gold)"/>
          <polygon points="30,63 30,82 49,65" fill="var(--gold)"/>
          <polygon points="43,37 43,53 59,45" fill="#07080a"/>
        </svg>
        <span>PlanMovies</span>
      </div>
    </div>
  </div>

  <!-- 7. TWO SEATS TOGETHER -->
  <div class="card">
    <span class="label">7 · Together (two seats)</span>
    <svg width="84" viewBox="0 0 100 100" aria-hidden="true">
      <rect x="16" y="54" width="68" height="22" rx="9" fill="var(--gold)"/>
      <rect x="23" y="28" width="25" height="30" rx="9" fill="var(--gold)"/>
      <rect x="52" y="28" width="25" height="30" rx="9" fill="var(--gold)"/>
      <rect x="20" y="74" width="8" height="12" rx="2" fill="var(--gold)"/>
      <rect x="72" y="74" width="8" height="12" rx="2" fill="var(--gold)"/>
    </svg>
    <div class="name">Plan<b>Movies</b></div>
    <div class="small">
      <div style="display:flex;flex-direction:column;align-items:center;gap:4px;">
        <svg width="24" viewBox="0 0 100 100" aria-hidden="true">
          <rect x="16" y="54" width="68" height="22" rx="9" fill="var(--gold)"/>
          <rect x="23" y="28" width="25" height="30" rx="9" fill="var(--gold)"/>
          <rect x="52" y="28" width="25" height="30" rx="9" fill="var(--gold)"/>
          <rect x="20" y="74" width="8" height="12" rx="2" fill="var(--gold)"/>
          <rect x="72" y="74" width="8" height="12" rx="2" fill="var(--gold)"/>
        </svg>
        <span class="cap">24px</span>
      </div>
      <div class="navsim">
        <svg width="20" viewBox="0 0 100 100" aria-hidden="true">
          <rect x="16" y="54" width="68" height="22" rx="9" fill="var(--gold)"/>
          <rect x="23" y="28" width="25" height="30" rx="9" fill="var(--gold)"/>
          <rect x="52" y="28" width="25" height="30" rx="9" fill="var(--gold)"/>
        </svg>
        <span>PlanMovies</span>
      </div>
    </div>
  </div>

  <!-- 8. CONFIRMED TICKET (ticket + check) -->
  <div class="card">
    <span class="label">8 · You're in (ticket + check)</span>
    <svg width="84" viewBox="0 0 100 100" aria-hidden="true">
      <rect x="14" y="32" width="72" height="36" rx="8" fill="var(--gold)"/>
      <circle cx="14" cy="50" r="8" fill="var(--bg-card)"/>
      <circle cx="86" cy="50" r="8" fill="var(--bg-card)"/>
      <path d="M40,50 L47,58 L62,42" fill="none" stroke="#07080a" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <div class="name">Plan<b>Movies</b></div>
    <div class="small">
      <div style="display:flex;flex-direction:column;align-items:center;gap:4px;">
        <svg width="24" viewBox="0 0 100 100" aria-hidden="true">
          <rect x="14" y="32" width="72" height="36" rx="8" fill="var(--gold)"/>
          <circle cx="14" cy="50" r="8" fill="var(--bg-card)"/>
          <circle cx="86" cy="50" r="8" fill="var(--bg-card)"/>
          <path d="M40,50 L47,58 L62,42" fill="none" stroke="#07080a" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span class="cap">24px</span>
      </div>
      <div class="navsim">
        <svg width="22" viewBox="0 0 100 100" aria-hidden="true">
          <rect x="14" y="32" width="72" height="36" rx="8" fill="var(--gold)"/>
          <circle cx="14" cy="50" r="8" fill="var(--bg-card)"/>
          <circle cx="86" cy="50" r="8" fill="var(--bg-card)"/>
          <path d="M40,50 L47,58 L62,42" fill="none" stroke="#07080a" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span>PlanMovies</span>
      </div>
    </div>
  </div>

</div>
</body>
</html>
