<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PlanMovies logo preview</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-deep: #07080a;
    --bg-card: #12151b;
    --gold: #c9a84c;
    --gold-warm: #b8984a;
    --text-primary: #e8e6e1;
    --text-secondary: #8a8880;
    --display: 'Barlow Condensed', sans-serif;
  }
  * { box-sizing: border-box; }
  body {
    background: var(--bg-deep); color: var(--text-primary);
    font-family: var(--display); margin: 0; padding: 40px 24px;
  }
  h1 { font-weight: 800; letter-spacing: 2px; text-transform: uppercase; font-size: 20px; color: var(--gold); }
  .eyebrow { color: var(--text-secondary); font-size: 13px; letter-spacing: 3px; text-transform: uppercase; margin: 32px 0 12px; }
  .row { display: flex; align-items: flex-end; gap: 40px; flex-wrap: wrap; padding: 24px; background: var(--bg-card); border-radius: 10px; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .item .cap { font-size: 11px; color: var(--text-secondary); letter-spacing: 1px; }
  .wordmark { display: flex; align-items: center; gap: 14px; }
  .wordmark span { font-weight: 700; letter-spacing: 4px; text-transform: uppercase; font-size: 22px; }
  .stack { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .stack .pm { font-weight: 800; letter-spacing: 6px; text-transform: uppercase; font-size: 26px; }
</style>
</head>
<body>

<h1>PlanMovies — seat mark vs current seal</h1>

<div class="eyebrow">New seat mark · sizes</div>
<div class="row">
  <div class="item">
    <svg width="16" viewBox="0 0 95 50" aria-hidden="true">
      <path d="M1,39 L1,20 Q1,9 12,9 L17,9 Q28,9 28,20 L28,39 Q28,43 24,43 L5,43 Q1,43 1,39 Z" fill="var(--text-primary)"/>
      <path d="M34,39 L34,20 Q34,9 45,9 L50,9 Q61,9 61,20 L61,39 Q61,43 57,43 L38,43 Q34,43 34,39 Z" fill="var(--gold)"/>
      <path d="M67,39 L67,20 Q67,9 78,9 L83,9 Q94,9 94,20 L94,39 Q94,43 90,43 L71,43 Q67,43 67,39 Z" fill="var(--text-primary)"/>
    </svg>
    <span class="cap">16px (favicon)</span>
  </div>
  <div class="item">
    <svg width="34" viewBox="0 0 95 50" aria-hidden="true">
      <path d="M1,39 L1,20 Q1,9 12,9 L17,9 Q28,9 28,20 L28,39 Q28,43 24,43 L5,43 Q1,43 1,39 Z" fill="var(--text-primary)"/>
      <path d="M34,39 L34,20 Q34,9 45,9 L50,9 Q61,9 61,20 L61,39 Q61,43 57,43 L38,43 Q34,43 34,39 Z" fill="var(--gold)"/>
      <path d="M67,39 L67,20 Q67,9 78,9 L83,9 Q94,9 94,20 L94,39 Q94,43 90,43 L71,43 Q67,43 67,39 Z" fill="var(--text-primary)"/>
    </svg>
    <span class="cap">34px (nav)</span>
  </div>
  <div class="item">
    <svg width="52" viewBox="0 0 95 50" aria-hidden="true">
      <path d="M1,39 L1,20 Q1,9 12,9 L17,9 Q28,9 28,20 L28,39 Q28,43 24,43 L5,43 Q1,43 1,39 Z" fill="var(--text-primary)"/>
      <path d="M34,39 L34,20 Q34,9 45,9 L50,9 Q61,9 61,20 L61,39 Q61,43 57,43 L38,43 Q34,43 34,39 Z" fill="var(--gold)"/>
      <path d="M67,39 L67,20 Q67,9 78,9 L83,9 Q94,9 94,20 L94,39 Q94,43 90,43 L71,43 Q67,43 67,39 Z" fill="var(--text-primary)"/>
    </svg>
    <span class="cap">52px (landing)</span>
  </div>
  <div class="item">
    <svg width="180" viewBox="0 0 95 50" aria-hidden="true">
      <path d="M1,39 L1,20 Q1,9 12,9 L17,9 Q28,9 28,20 L28,39 Q28,43 24,43 L5,43 Q1,43 1,39 Z" fill="var(--text-primary)"/>
      <path d="M34,39 L34,20 Q34,9 45,9 L50,9 Q61,9 61,20 L61,39 Q61,43 57,43 L38,43 Q34,43 34,39 Z" fill="var(--gold)"/>
      <path d="M67,39 L67,20 Q67,9 78,9 L83,9 Q94,9 94,20 L94,39 Q94,43 90,43 L71,43 Q67,43 67,39 Z" fill="var(--text-primary)"/>
    </svg>
    <span class="cap">large</span>
  </div>
</div>

<div class="eyebrow">In the wordmark (current nav layout) vs stacked</div>
<div class="row">
  <div class="wordmark">
    <span style="color:var(--gold);">PLAN</span>
    <svg width="40" viewBox="0 0 95 50" aria-hidden="true">
      <path d="M1,39 L1,20 Q1,9 12,9 L17,9 Q28,9 28,20 L28,39 Q28,43 24,43 L5,43 Q1,43 1,39 Z" fill="var(--text-primary)"/>
      <path d="M34,39 L34,20 Q34,9 45,9 L50,9 Q61,9 61,20 L61,39 Q61,43 57,43 L38,43 Q34,43 34,39 Z" fill="var(--gold)"/>
      <path d="M67,39 L67,20 Q67,9 78,9 L83,9 Q94,9 94,20 L94,39 Q94,43 90,43 L71,43 Q67,43 67,39 Z" fill="var(--text-primary)"/>
    </svg>
    <span style="color:var(--gold);">MOVIES</span>
  </div>
  <div class="stack">
    <svg width="120" viewBox="0 0 95 50" aria-hidden="true">
      <path d="M1,39 L1,20 Q1,9 12,9 L17,9 Q28,9 28,20 L28,39 Q28,43 24,43 L5,43 Q1,43 1,39 Z" fill="var(--text-primary)"/>
      <path d="M34,39 L34,20 Q34,9 45,9 L50,9 Q61,9 61,20 L61,39 Q61,43 57,43 L38,43 Q34,43 34,39 Z" fill="var(--gold)"/>
      <path d="M67,39 L67,20 Q67,9 78,9 L83,9 Q94,9 94,20 L94,39 Q94,43 90,43 L71,43 Q67,43 67,39 Z" fill="var(--text-primary)"/>
    </svg>
    <span class="pm">PlanMovies</span>
  </div>
</div>

<div class="eyebrow">Current seal (for comparison)</div>
<div class="row">
  <div class="item">
    <svg width="52" viewBox="-2 14 104 72" aria-hidden="true">
      <g transform="rotate(-12 50 50)">
        <path d="M 6 24 L 94 24 L 94 40 A 6 6 0 0 0 94 60 L 94 76 L 6 76 L 6 60 A 6 6 0 0 0 6 40 Z" fill="var(--gold)"/>
      </g>
      <circle cx="50" cy="50" r="30" fill="var(--bg-deep)" stroke="var(--gold)" stroke-width="5"/>
      <polygon points="42,36 42,64 64,50" fill="var(--gold)"/>
    </svg>
    <span class="cap">seal 52px</span>
  </div>
</div>

</body>
</html>
