<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PlanMovies — logo, matched</title>
<link rel="preconnect" href="https://api.fontshare.com">
<link href="https://api.fontshare.com/v2/css?f[]=clash-display@600,700&display=swap" rel="stylesheet">
<!-- favicon: simplified solid red row on dark tile -->
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%230d0a0b'/%3E%3Cg fill='%23b5392f'%3E%3Crect x='10' y='30' width='22' height='32' rx='8'/%3E%3Crect x='7' y='56' width='28' height='18' rx='8'/%3E%3Crect x='68' y='30' width='22' height='32' rx='8'/%3E%3Crect x='65' y='56' width='28' height='18' rx='8'/%3E%3C/g%3E%3Cg fill='%23f06352'%3E%3Crect x='38' y='27' width='24' height='34' rx='9'/%3E%3Crect x='34' y='54' width='32' height='21' rx='9'/%3E%3C/g%3E%3C/svg%3E">
<style>
  :root{ --bg:#0a0809; --line:#23202060; --txt-dim:#9a9498; --cream:#f4f1ee; --movies:#e34b3f; }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--cream);font-family:-apple-system,BlinkMacSystemFont,Inter,sans-serif;-webkit-font-smoothing:antialiased;min-height:100vh}
  .room{position:relative;min-height:100vh;overflow:hidden;
        background:
          radial-gradient(120% 80% at 50% 96%, rgba(214,58,46,.30) 0%, rgba(214,58,46,.07) 40%, transparent 66%),
          radial-gradient(70% 50% at 50% 0%, rgba(160,40,32,.10) 0%, transparent 55%),
          var(--bg);}

  /* ---- shared seat gradients ---- */
  /* ---- NAV ---- */
  .nav{display:flex;align-items:center;gap:11px;padding:18px 22px;position:relative;z-index:3}
  .navtile{width:38px;height:38px;border-radius:10px;background:#0d0a0b;display:flex;align-items:center;justify-content:center;
           box-shadow:0 0 0 1px #241b1c, 0 0 16px rgba(214,58,46,.30)}
  .wm{font-family:"Clash Display",Inter,sans-serif;font-weight:700;font-size:22px;letter-spacing:-.012em}
  .wm .p{color:var(--cream)} .wm .m{color:var(--movies)}

  /* ---- HERO MARK ---- */
  .hero{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:70px 24px 90px}
  .markwrap{position:relative}
  .markwrap::before{content:"";position:absolute;inset:-22% -10% -28% -10%;
    background:radial-gradient(closest-side, rgba(240,90,74,.34), rgba(214,58,46,.10) 55%, transparent 78%);
    filter:blur(8px);z-index:-1}
  svg{display:block}
  .cap{margin-top:54px;font-family:"JetBrains Mono",monospace;font-size:11px;letter-spacing:.3em;text-transform:uppercase;color:var(--txt-dim)}
  footer{position:relative;z-index:2;text-align:center;color:var(--txt-dim);font-size:13px;padding:0 24px 40px}
  footer b{color:var(--cream)}
</style>
</head>
<body>
<div class="room">

  <!-- gradient + filter defs -->
  <svg width="0" height="0" style="position:absolute" aria-hidden="true">
    <defs>
      <linearGradient id="side" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#cd463a"/><stop offset="100%" stop-color="#9e2a22"/>
      </linearGradient>
      <radialGradient id="lit" cx="50%" cy="42%" r="62%">
        <stop offset="0%" stop-color="#ff9e86"/><stop offset="46%" stop-color="#f0604e"/><stop offset="100%" stop-color="#c93a2f"/>
      </radialGradient>
      <!-- one seat = rounded-top back + plush cushion; reused -->
      <symbol id="seatSide" viewBox="0 0 60 96">
        <rect x="8" y="6" width="44" height="60" rx="17" fill="url(#side)"/>
        <rect x="3" y="60" width="54" height="32" rx="14" fill="url(#side)"/>
      </symbol>
      <symbol id="seatLit" viewBox="0 0 64 100">
        <rect x="9" y="2" width="46" height="62" rx="18" fill="url(#lit)"/>
        <rect x="3" y="58" width="58" height="36" rx="15" fill="url(#lit)"/>
      </symbol>
    </defs>
  </svg>

  <!-- NAV -->
  <div class="nav">
    <span class="navtile">
      <svg width="26" height="20" viewBox="0 0 100 76" aria-hidden="true">
        <g fill="#b5392f"><rect x="10" y="14" width="22" height="34" rx="8"/><rect x="7" y="44" width="28" height="18" rx="8"/><rect x="68" y="14" width="22" height="34" rx="8"/><rect x="65" y="44" width="28" height="18" rx="8"/></g>
        <g fill="#f06352"><rect x="38" y="10" width="24" height="38" rx="9"/><rect x="34" y="42" width="32" height="21" rx="9"/></g>
      </svg>
    </span>
    <span class="wm"><span class="p">Plan</span><span class="m">Movies</span></span>
  </div>

  <!-- HERO MARK (matches the screenshots: lit center, gradient seats, ambient glow) -->
  <div class="hero">
    <div class="markwrap">
      <svg width="300" height="210" viewBox="0 0 230 150" aria-label="PlanMovies — the row">
        <!-- side seats -->
        <use href="#seatSide" x="2"   y="50" width="60" height="96"/>
        <use href="#seatSide" x="168" y="50" width="60" height="96"/>
        <!-- lit center, slightly taller + forward -->
        <use href="#seatLit"  x="83"  y="40" width="64" height="100"/>
      </svg>
    </div>
    <div class="cap">Get the row together</div>
  </div>

  <footer>
    <b>Matched to your target.</b> Gradient-shaded seats, lit center, ambient red glow, nav tile + Plan/Movies.
    This is inline SVG (gradients + radial highlight), so it scales and stays crisp. Favicon is in the tab.
    Say the word and I wire this exact mark into the live app.
  </footer>
</div>
</body>
</html>
