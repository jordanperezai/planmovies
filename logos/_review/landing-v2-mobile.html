<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PlanMovies landing v2 — mobile</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;800&family=Barlow+Condensed:wght@600;700;800&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
:root{
  --gold:#e53908; --gold-warm:#fb5316; --gold-cool:#c9582f; --gold-dim:#b32c06; --gold-bright:#ff6326;
  --cream:#f3f1ec; --bg-deep:#07080a; --text-inverse:#07080a;
  --text-secondary:#a8a29a; --text-tertiary:#6b6660; --border-subtle:#23262b; --bg-elevated:#16191f;
  --display:'Barlow Condensed',sans-serif; --font:'Inter',sans-serif; --mono:'JetBrains Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg-deep);font-family:var(--font);color:var(--cream);-webkit-font-smoothing:antialiased}

.landing{position:relative;height:100dvh;overflow:hidden;display:flex;flex-direction:column}
.landing-bg{position:absolute;inset:0;z-index:0;background:
  radial-gradient(ellipse 100% 60% at 50% 120%, rgba(229,57,8,0.12), transparent 64%),
  radial-gradient(ellipse 70% 50% at 50% 16%, rgba(42,58,90,0.12), transparent 58%);}
.landing-backdrop{position:absolute;inset:0;z-index:0;overflow:hidden}
.landing-backdrop img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center 14%}
.landing-backdrop::after{content:'';position:absolute;inset:0;
  background:linear-gradient(to top, var(--bg-deep) 0%, rgba(7,8,10,0.92) 30%, rgba(7,8,10,0.5) 60%, rgba(7,8,10,0.12) 100%)}

.landing-inner{position:relative;z-index:1;flex:1;display:flex;flex-direction:column;justify-content:space-between;
  padding:30px 24px calc(26px + env(safe-area-inset-bottom,0px));width:100%;max-width:460px;margin:0 auto}

/* top zone */
.lockup{display:flex;flex-direction:column;align-items:flex-start;gap:7px}
.hero-mark{width:150px;height:auto;overflow:visible;filter:drop-shadow(0 2px 10px rgba(0,0,0,0.5))}
.hero-mark .seat{fill:rgba(229,57,8,0.06);stroke:var(--gold-cool);stroke-width:2.5}
.hero-mark .seat.filled{fill:url(#ember-vert);stroke:var(--gold)}
.lockup-word{font-family:'Poppins',sans-serif;font-weight:800;letter-spacing:-1.1px;font-size:32px;line-height:1;text-shadow:0 2px 12px rgba(0,0,0,0.5)}
.lockup-word .mv{background:linear-gradient(180deg,var(--gold-bright),var(--gold));-webkit-background-clip:text;background-clip:text;color:var(--gold);-webkit-text-fill-color:transparent}
.lockup-slogan{font-family:'Poppins',sans-serif;font-weight:600;font-size:14px;color:#cfcac2}
.lockup-status{font-size:13px;color:var(--text-secondary);margin-top:1px}

/* bottom zone */
.lower{display:flex;flex-direction:column;align-items:flex-start}
.eyebrow{font-family:var(--display);font-weight:600;letter-spacing:3px;font-size:13px;color:var(--gold-warm);text-transform:uppercase;margin-bottom:7px}
.title{font-family:var(--display);font-weight:800;font-size:30px;letter-spacing:1.5px;line-height:0.98;color:var(--cream)}
.credit{font-family:var(--display);font-weight:600;letter-spacing:3px;font-size:14px;color:var(--text-secondary);margin-top:7px;text-transform:uppercase}
.when{margin-top:14px}
.date{font-family:var(--display);font-weight:700;letter-spacing:1px;font-size:19px;color:var(--cream);text-transform:uppercase}
.venue{font-size:13px;color:var(--text-secondary);margin-top:4px}
.crew-row{display:flex;align-items:center;gap:6px;margin-top:18px;padding-bottom:10px}
.av{width:40px;height:40px;border-radius:50%;background:var(--bg-elevated);border:2px solid var(--gold-cool);
  display:flex;align-items:center;justify-content:center;font-weight:700;color:var(--gold-cool);font-size:15px;position:relative;flex-shrink:0}
.av.director{border-color:var(--gold);color:var(--gold)}
.director-badge{position:absolute;bottom:-7px;left:50%;transform:translateX(-50%);background:var(--gold);color:var(--text-inverse);
  font-family:var(--display);font-weight:700;font-size:9px;letter-spacing:1px;padding:1px 6px;border-radius:3px;white-space:nowrap}
.headcount{font-size:15px;color:var(--text-secondary);margin-top:2px}
.headcount strong{color:var(--gold-warm);font-weight:700}

.cd{display:inline-flex;align-items:center;gap:11px;margin-top:16px;border:1px solid var(--border-subtle);
  border-radius:9px;padding:9px 13px;background:rgba(7,8,10,0.55)}
.cd .spr{display:flex;flex-direction:column;gap:3px}
.cd .spr span{width:4px;height:4px;background:rgba(179,44,6,0.35);border-radius:1px}
.cd .units{display:flex;align-items:flex-start;gap:7px}
.cd .unit{display:flex;flex-direction:column;align-items:center}
.cd .num{font-family:var(--mono);font-weight:700;font-size:25px;color:var(--cream);line-height:1}
.cd .lab{font-family:var(--mono);font-size:9px;letter-spacing:1px;color:var(--text-tertiary);margin-top:4px}
.cd .sep{font-family:var(--mono);color:rgba(179,44,6,0.55);font-size:19px;line-height:1;margin-top:1px}

.cta{margin-top:18px;width:100%;max-width:340px;padding:16px;font-family:var(--font);font-weight:700;font-size:16px;
  color:var(--text-inverse);border:none;border-radius:12px;cursor:pointer;
  background:linear-gradient(180deg,var(--gold-bright) 0%,var(--gold) 55%,var(--gold) 100%);
  box-shadow:0 10px 30px rgba(229,57,8,0.28)}
.whatis{margin-top:11px;background:none;border:none;font-family:var(--font);font-size:15px;color:var(--text-secondary);padding:6px 0;cursor:pointer}
</style>
</head>
<body>
<svg width="0" height="0" style="position:absolute" aria-hidden="true"><defs>
  <linearGradient id="ember-vert" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#ff6326"/><stop offset="1" stop-color="#e53908"/>
  </linearGradient>
</defs></svg>

<section class="landing">
  <div class="landing-bg"></div>
  <div class="landing-backdrop"><img src="https://image.tmdb.org/t/p/w780/3o5YPjDGDTcTDL5ftDA9NwN9dLd.jpg" alt=""></div>
  <div class="landing-inner">

    <div class="lockup">
      <svg class="hero-mark" viewBox="0 0 216 36" aria-hidden="true">
        <path class="seat filled" d="M0,36 L0,12 A12,12 0 0 1 12,0 L28,0 A12,12 0 0 1 40,12 L40,36 Z"/>
        <path class="seat" d="M44,36 L44,12 A12,12 0 0 1 56,0 L72,0 A12,12 0 0 1 84,12 L84,36 Z"/>
        <path class="seat" d="M88,36 L88,12 A12,12 0 0 1 100,0 L116,0 A12,12 0 0 1 128,12 L128,36 Z"/>
        <path class="seat" d="M132,36 L132,12 A12,12 0 0 1 144,0 L160,0 A12,12 0 0 1 172,12 L172,36 Z"/>
        <path class="seat" d="M176,36 L176,12 A12,12 0 0 1 188,0 L204,0 A12,12 0 0 1 216,12 L216,36 Z"/>
      </svg>
      <div class="lockup-word"><span style="color:var(--cream)">plan</span><span class="mv">movies</span></div>
      <div class="lockup-slogan">Get the row together.</div>
      <div class="lockup-status">2 of 5 seats saved</div>
    </div>

    <div class="lower">
      <div class="eyebrow">Now Planning</div>
      <h1 class="title">DISCLOSURE DAY</h1>
      <div class="credit">A Steven Spielberg Film</div>
      <div class="when">
        <div class="date">FRI JUN 12 &middot; 7:00 PM</div>
        <div class="venue">Regal Secaucus &middot; Secaucus, NJ</div>
      </div>
      <div class="crew-row">
        <div class="av director">J<span class="director-badge">DIRECTOR</span></div>
        <div class="av">S</div>
      </div>
      <div class="headcount"><strong>Jordan &amp; Sarai</strong> are going. Join them.</div>
      <div class="cd">
        <div class="spr"><span></span><span></span><span></span><span></span></div>
        <div class="units">
          <div class="unit"><span class="num">13</span><span class="lab">DAYS</span></div>
          <span class="sep">:</span>
          <div class="unit"><span class="num">07</span><span class="lab">HRS</span></div>
          <span class="sep">:</span>
          <div class="unit"><span class="num">35</span><span class="lab">MIN</span></div>
          <span class="sep">:</span>
          <div class="unit"><span class="num">13</span><span class="lab">SEC</span></div>
        </div>
        <div class="spr"><span></span><span></span><span></span><span></span></div>
      </div>
      <button class="cta">COUNT ME IN</button>
      <button class="whatis">What is Disclosure Day?</button>
    </div>

  </div>
</section>
</body>
</html>
