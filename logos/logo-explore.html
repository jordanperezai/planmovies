<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PlanMovies — logo directions</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-deep:#07080a; --bg-card:#12151b; --gold:#c9a84c; --text-primary:#e8e6e1; --text-secondary:#8a8880;
    --display:'Barlow Condensed',sans-serif;
  }
  *{box-sizing:border-box;}
  body{background:var(--bg-deep);color:var(--text-primary);font-family:var(--display);margin:0;padding:32px 20px;}
  h1{font-weight:800;letter-spacing:2px;text-transform:uppercase;font-size:18px;color:var(--gold);margin:0 0 4px;}
  .sub{color:var(--text-secondary);font-size:13px;letter-spacing:1px;margin-bottom:28px;}
  .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;max-width:760px;}
  .card{background:var(--bg-card);border-radius:12px;padding:28px 20px;display:flex;flex-direction:column;align-items:center;gap:16px;}
  .name{font-weight:700;letter-spacing:5px;text-transform:uppercase;font-size:22px;color:var(--text-primary);}
  .name b{color:var(--gold);font-weight:700;}
  .label{color:var(--gold);font-size:11px;letter-spacing:2px;text-transform:uppercase;}
  .small{display:flex;align-items:center;gap:18px;margin-top:4px;padding-top:14px;border-top:1px solid rgba(255,255,255,.06);width:100%;justify-content:center;}
  .small .cap{font-size:10px;color:var(--text-secondary);letter-spacing:1px;}
  .navsim{display:flex;align-items:center;gap:8px;}
  .navsim span{font-size:12px;letter-spacing:2px;color:var(--text-secondary);text-transform:uppercase;}
</style>
</head>
<body>
<h1>PlanMovies — four logo directions</h1>
<div class="sub">Each is a standalone mark + wordmark. Bottom strip = does it survive at 24px and in the nav.</div>

<div class="grid">

  <!-- 1. HELD SEAT (single armchair) -->
  <div class="card">
    <span class="label">1 · Held seat</span>
    <svg width="84" viewBox="0 0 100 100" aria-hidden="true">
      <rect x="30" y="22" width="40" height="42" rx="13" fill="var(--gold)"/>
      <rect x="19" y="42" width="15" height="34" rx="7" fill="var(--gold)"/>
      <rect x="66" y="42" width="15" height="34" rx="7" fill="var(--gold)"/>
      <rect x="26" y="54" width="48" height="22" rx="9" fill="var(--gold)"/>
      <rect x="27" y="74" width="8" height="13" rx="2" fill="var(--gold)"/>
      <rect x="65" y="74" width="8" height="13" rx="2" fill="var(--gold)"/>
    </svg>
    <div class="name">Plan<b>Movies</b></div>
    <div class="small">
      <div style="display:flex;flex-direction:column;align-items:center;gap:4px;">
        <svg width="24" viewBox="0 0 100 100" aria-hidden="true">
          <rect x="30" y="22" width="40" height="42" rx="13" fill="var(--gold)"/>
          <rect x="19" y="42" width="15" height="34" rx="7" fill="var(--gold)"/>
          <rect x="66" y="42" width="15" height="34" rx="7" fill="var(--gold)"/>
          <rect x="26" y="54" width="48" height="22" rx="9" fill="var(--gold)"/>
          <rect x="27" y="74" width="8" height="13" rx="2" fill="var(--gold)"/>
          <rect x="65" y="74" width="8" height="13" rx="2" fill="var(--gold)"/>
        </svg>
        <span class="cap">24px</span>
      </div>
      <div class="navsim">
        <svg width="20" viewBox="0 0 100 100" aria-hidden="true">
          <rect x="30" y="22" width="40" height="42" rx="13" fill="var(--gold)"/>
          <rect x="19" y="42" width="15" height="34" rx="7" fill="var(--gold)"/>
          <rect x="66" y="42" width="15" height="34" rx="7" fill="var(--gold)"/>
          <rect x="26" y="54" width="48" height="22" rx="9" fill="var(--gold)"/>
        </svg>
        <span>PlanMovies</span>
      </div>
    </div>
  </div>

  <!-- 2. TICKET + PLAY -->
  <div class="card">
    <span class="label">2 · Ticket</span>
    <svg width="84" viewBox="0 0 100 100" aria-hidden="true">
      <rect x="14" y="30" width="72" height="40" rx="9" fill="var(--gold)"/>
      <circle cx="14" cy="50" r="8" fill="var(--bg-card)"/>
      <circle cx="86" cy="50" r="8" fill="var(--bg-card)"/>
      <polygon points="44,42 44,58 60,50" fill="var(--bg-card)"/>
    </svg>
    <div class="name">Plan<b>Movies</b></div>
    <div class="small">
      <div style="display:flex;flex-direction:column;align-items:center;gap:4px;">
        <svg width="24" viewBox="0 0 100 100" aria-hidden="true">
          <rect x="14" y="30" width="72" height="40" rx="9" fill="var(--gold)"/>
          <circle cx="14" cy="50" r="8" fill="var(--bg-card)"/>
          <circle cx="86" cy="50" r="8" fill="var(--bg-card)"/>
          <polygon points="44,42 44,58 60,50" fill="var(--bg-card)"/>
        </svg>
        <span class="cap">24px</span>
      </div>
      <div class="navsim">
        <svg width="22" viewBox="0 0 100 100" aria-hidden="true">
          <rect x="14" y="30" width="72" height="40" rx="9" fill="var(--gold)"/>
          <circle cx="14" cy="50" r="8" fill="var(--bg-card)"/>
          <circle cx="86" cy="50" r="8" fill="var(--bg-card)"/>
          <polygon points="44,42 44,58 60,50" fill="var(--bg-card)"/>
        </svg>
        <span>PlanMovies</span>
      </div>
    </div>
  </div>

  <!-- 3. PM MONOGRAM -->
  <div class="card">
    <span class="label">3 · Monogram</span>
    <svg width="84" viewBox="0 0 100 100" aria-hidden="true">
      <rect x="16" y="16" width="68" height="68" rx="18" fill="var(--gold)"/>
      <text x="50" y="52" text-anchor="middle" dominant-baseline="central" font-family="Barlow Condensed" font-weight="800" font-size="44" letter-spacing="-2" fill="#07080a">PM</text>
    </svg>
    <div class="name">Plan<b>Movies</b></div>
    <div class="small">
      <div style="display:flex;flex-direction:column;align-items:center;gap:4px;">
        <svg width="24" viewBox="0 0 100 100" aria-hidden="true">
          <rect x="16" y="16" width="68" height="68" rx="18" fill="var(--gold)"/>
          <text x="50" y="52" text-anchor="middle" dominant-baseline="central" font-family="Barlow Condensed" font-weight="800" font-size="44" letter-spacing="-2" fill="#07080a">PM</text>
        </svg>
        <span class="cap">24px</span>
      </div>
      <div class="navsim">
        <svg width="20" viewBox="0 0 100 100" aria-hidden="true">
          <rect x="16" y="16" width="68" height="68" rx="18" fill="var(--gold)"/>
          <text x="50" y="52" text-anchor="middle" dominant-baseline="central" font-family="Barlow Condensed" font-weight="800" font-size="44" letter-spacing="-2" fill="#07080a">PM</text>
        </svg>
        <span>PlanMovies</span>
      </div>
    </div>
  </div>

  <!-- 4. PIN + PLAY -->
  <div class="card">
    <span class="label">4 · Meet-here pin</span>
    <svg width="84" viewBox="0 0 100 100" aria-hidden="true">
      <path d="M50,16 C31,16 16,31 16,50 C16,74 50,88 50,88 C50,88 84,74 84,50 C84,31 69,16 50,16 Z" fill="var(--gold)"/>
      <polygon points="43,38 43,56 61,47" fill="#07080a"/>
    </svg>
    <div class="name">Plan<b>Movies</b></div>
    <div class="small">
      <div style="display:flex;flex-direction:column;align-items:center;gap:4px;">
        <svg width="24" viewBox="0 0 100 100" aria-hidden="true">
          <path d="M50,16 C31,16 16,31 16,50 C16,74 50,88 50,88 C50,88 84,74 84,50 C84,31 69,16 50,16 Z" fill="var(--gold)"/>
          <polygon points="43,38 43,56 61,47" fill="#07080a"/>
        </svg>
        <span class="cap">24px</span>
      </div>
      <div class="navsim">
        <svg width="18" viewBox="0 0 100 100" aria-hidden="true">
          <path d="M50,16 C31,16 16,31 16,50 C16,74 50,88 50,88 C50,88 84,74 84,50 C84,31 69,16 50,16 Z" fill="var(--gold)"/>
          <polygon points="43,38 43,56 61,47" fill="#07080a"/>
        </svg>
        <span>PlanMovies</span>
      </div>
    </div>
  </div>

</div>
</body>
</html>
